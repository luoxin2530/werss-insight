services:
  werss-insight:
    image: ${WERSS_INSIGHT_IMAGE:-ghcr.io/luoxin2530/werss-insight:latest}
    container_name: werss-insight
    restart: unless-stopped
    ports:
      - "${WERSS_INSIGHT_PORT:-8765}:8765"
    env_file:
      - .env
    volumes:
      - "${WERSS_INSIGHT_DATA_DIR:-./data}:/app/data"
