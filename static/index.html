<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WeRSS Insight</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260520-4" />
  </head>
  <body>
    <div class="shell">
      <aside class="side">
        <div class="brand">
          <div class="mark">WI</div>
          <div>
            <h1>WeRSS Insight</h1>
            <p id="syncState">等待连接</p>
          </div>
        </div>

        <nav class="nav" aria-label="主导航">
          <button class="nav-item active" data-view="dashboard">总览</button>
          <button class="nav-item" data-view="reader">阅读队列</button>
          <button class="nav-item" data-view="accounts">作者画像</button>
          <button class="nav-item" data-view="settings">配置</button>
        </nav>

        <section class="panel compact">
          <div class="panel-title">WeRSS 状态</div>
          <dl class="status-list" id="werssStatus">
            <div><dt>连接</dt><dd>检查中</dd></div>
            <div><dt>文章</dt><dd>-</dd></div>
            <div><dt>补抓</dt><dd>-</dd></div>
          </dl>
        </section>

        <section class="panel compact">
          <div class="panel-title">任务</div>
          <button class="action primary" id="runFull">同步并总结</button>
          <button class="action" id="runSync">只同步</button>
          <button class="action" id="runSummarize">只总结</button>
          <div class="task-card idle" id="taskStatus">
            <div class="task-card-head">
              <span id="taskStage">等待任务</span>
              <strong id="taskPercent">-</strong>
            </div>
            <div class="task-bar" aria-hidden="true"><span id="taskBar"></span></div>
            <p id="taskMessage">还没有启动同步任务。</p>
            <dl class="task-stats" id="taskStats"></dl>
          </div>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="viewTitle">总览</h2>
            <p id="viewSubtitle">按阅读价值组织你的公众号信息流。</p>
          </div>
          <div class="top-actions">
            <input id="searchInput" type="search" placeholder="搜索文章或公众号" />
            <button class="icon-button" id="refreshAll" title="刷新面板">
              <span>刷新</span>
            </button>
          </div>
        </header>

        <section class="view active" id="dashboardView">
          <div class="metric-grid" id="metrics"></div>
          <div class="split">
            <section class="panel">
              <div class="panel-head">
                <h3>高价值文章</h3>
                <button class="text-button" data-view-link="reader">查看全部</button>
              </div>
              <div class="article-list" id="topArticles"></div>
            </section>
            <section class="panel">
              <div class="panel-head">
                <h3>最近运行</h3>
              </div>
              <div class="run-list" id="runList"></div>
            </section>
          </div>
        </section>

        <section class="view" id="readerView">
          <div class="reader-layout">
            <section class="panel list-pane">
              <div class="panel-head">
                <h3>阅读队列</h3>
                <select id="sortSelect">
                  <option value="value">按价值</option>
                  <option value="time">按时间</option>
                </select>
              </div>
              <div class="article-list selectable" id="articleList"></div>
            </section>
            <article class="panel article-pane" id="articleDetail">
              <div class="empty-state">选择一篇文章开始阅读。</div>
            </article>
          </div>
        </section>

        <section class="view" id="accountsView">
          <div class="account-layout">
            <section class="account-grid" id="accountGrid"></section>
            <section class="panel account-detail-pane" id="accountDetail"></section>
          </div>
        </section>

        <section class="view" id="settingsView">
          <form class="settings-grid" id="configForm">
            <section class="panel">
              <div class="panel-head"><h3>WeRSS</h3></div>
              <label>接口地址<input name="werss_base_url" /></label>
              <label>Access Key<input name="werss_access_key" placeholder="留空表示不修改" /></label>
              <label>Secret Key<input name="werss_secret_key" type="password" placeholder="留空表示不修改" /></label>
              <label>单次同步文章数<input name="sync_limit" type="number" min="0" max="5000" /></label>
            </section>

            <section class="panel">
              <div class="panel-head"><h3>大模型</h3></div>
              <label>接口地址<input name="llm_base_url" /></label>
              <label>API Key<input name="llm_api_key" type="password" placeholder="留空表示不修改" /></label>
              <label>模型名称<input name="llm_model" /></label>
              <label>Temperature<input name="llm_temperature" type="number" min="0" max="2" step="0.1" /></label>
              <label>最大正文字符<input name="max_article_chars" type="number" min="1000" max="50000" /></label>
              <label class="check-row"><input name="allow_llm" type="checkbox" />启用大模型总结</label>
              <div class="test-box">
                <button class="action" type="button" id="testLlm">测试模型连接</button>
                <div class="test-result" id="llmTestResult">还没有进行连接测试。</div>
              </div>
            </section>

            <section class="panel">
              <div class="panel-head"><h3>计划</h3></div>
              <label>间隔天数<input name="schedule_days" type="number" min="1" max="30" /></label>
              <label>运行时间<input name="schedule_time" type="time" /></label>
              <label>提醒 Webhook<input name="notify_webhook_url" placeholder="留空关闭提醒" /></label>
              <label>提醒最低分<input name="notify_min_score" type="number" min="1" max="10" step="0.1" /></label>
              <label>提醒篇数<input name="notify_top_n" type="number" min="1" max="30" /></label>
              <label class="check-row"><input name="auto_run" type="checkbox" />自动运行</label>
              <button class="action primary wide" type="submit">保存配置</button>
            </section>

            <section class="panel span-two">
              <div class="panel-head">
                <h3>近况看板</h3>
                <div class="panel-actions">
                  <button class="text-button" type="button" id="refreshDailyStats">刷新</button>
                </div>
              </div>
              <div class="daily-summary" id="dailySummary"></div>
              <div class="daily-table-wrap">
                <table class="daily-table">
                  <thead>
                    <tr>
                      <th>日期</th>
                      <th>新增</th>
                      <th>已总结</th>
                      <th>LLM</th>
                      <th>规则</th>
                      <th>Prompt</th>
                      <th>Completion</th>
                      <th>Total</th>
                    </tr>
                  </thead>
                  <tbody id="dailyStatsBody"></tbody>
                </table>
              </div>
              <p class="footnote" id="dailyStatsNote"></p>
            </section>

            <section class="panel span-two">
              <div class="panel-head"><h3>备份与迁移</h3></div>
              <div class="backup-row">
                <button class="action" type="button" id="exportBackup">下载备份包</button>
                <label class="file-label">
                  <span>导入备份包</span>
                  <input id="importBackup" type="file" accept=".zip" />
                </label>
              </div>
              <p class="footnote">备份包包含数据库、配置和媒体目录。导入会覆盖当前实例的数据，请先确认目标容器是空库或可替换状态。</p>
              <div class="test-result" id="backupResult">尚未导出或导入备份。</div>
            </section>
          </form>
        </section>
      </main>
    </div>

    <div class="toast" id="toast"></div>
    <script src="/static/app.js?v=20260520-5" type="module"></script>
  </body>
</html>
